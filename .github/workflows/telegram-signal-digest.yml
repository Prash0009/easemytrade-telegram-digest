name: EaseMyTrade Telegram Signal Digest

on:
  schedule:
    # Telegram window: 9:00 AM through 4:00 PM IST.
    # GitHub cron uses UTC, so IST 9:00-16:00 = UTC 3:30-10:30.
    # Public repo => unlimited free Actions minutes, so run every 5 minutes so
    # 5-minute candle signals are not missed between cron ticks.
    - cron: "*/5 3-10 * * 1-5"
  workflow_dispatch:
    inputs:
      always_send:
        description: "Send even if the current signal digest is unchanged"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      record_current:
        description: "Record current signal signature without sending"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: write

concurrency:
  group: easemytrade-telegram-signal-digest-main
  cancel-in-progress: false

jobs:
  telegram-signal-digest:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Send changed signal digest
        env:
          TELEGRAM_SIGNAL_BOT_TOKEN: ${{ secrets.TELEGRAM_SIGNAL_BOT_TOKEN }}
          TELEGRAM_SIGNAL_CHAT_ID: ${{ secrets.TELEGRAM_SIGNAL_CHAT_ID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_SIGNAL_STATE_PATH: data/telegram_signal_state.json
          TELEGRAM_PAYLOAD_SOURCE: live
          # Public scope so the unauthenticated runner can read live signals
          # (the API returns 401 without scope=public). Trailing slash avoids a
          # 308 redirect.
          EASEMYTRADE_MARKET_API_URL: https://www.easemytrade.in/api/live-market/?scope=public
        run: |
          args=(--source live)
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.always_send }}" == "true" ]]; then
            args+=(--always-send)
          fi
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.record_current }}" == "true" ]]; then
            args+=(--record-current)
          fi
          echo "Signal digest check"
          python scripts/send_telegram_signal_digest.py "${args[@]}"

      - name: Commit signal digest state
        run: |
          if git diff --quiet -- data/telegram_signal_state.json; then
            echo "No signal digest state changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/telegram_signal_state.json
          if git diff --cached --quiet; then
            echo "No signal digest state changes staged."
            exit 0
          fi
          git commit -m "chore: update telegram signal digest state [skip ci]"
          git pull --rebase origin main
          git push origin main

  # Keeps www.easemytrade.in/data/market.json fresh by riding this workflow's
  # reliably dispatched cadence (external cron every ~2 min). GitHub throttles
  # native `schedule` triggers heavily — on 2026-07-06 the site repo's own
  # scheduled refresh fired only twice all day, freezing the public snapshot
  # at "13:37 IST". This job is fully independent of the digest job above and
  # is marked continue-on-error so it can never affect digest delivery.
  refresh-site-market-data:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true

    steps:
      - name: Checkout easemytrade site (write deploy key)
        uses: actions/checkout@v5
        with:
          repository: Prash0009/easemytrade
          ssh-key: ${{ secrets.EASEMYTRADE_PUSH_KEY }}
          path: site
          fetch-depth: 0

      - name: Decide whether a refresh is due
        id: gate
        run: |
          dow=$(TZ=Asia/Kolkata date +%u)
          now_ist=$(TZ=Asia/Kolkata date +%H%M)
          if [ "$dow" -gt 5 ] || [ "$now_ist" -lt 905 ] || [ "$now_ist" -gt 1550 ]; then
            echo "due=false" >> "$GITHUB_OUTPUT"
            echo "Outside the Mon-Fri 09:05-15:50 IST refresh window."
            exit 0
          fi
          last=$(git -C site log -1 --format=%ct -- data/market.json)
          age=$(( $(date +%s) - ${last:-0} ))
          if [ "$age" -lt 480 ]; then
            echo "due=false" >> "$GITHUB_OUTPUT"
            echo "market.json is ${age}s old; fresh enough, skipping."
          else
            echo "due=true" >> "$GITHUB_OUTPUT"
            echo "market.json is ${age}s old; regenerating."
          fi

      - name: Checkout signal tracker (read deploy key)
        if: steps.gate.outputs.due == 'true'
        uses: actions/checkout@v5
        with:
          repository: Prash0009/nifty-signal-tracker
          ssh-key: ${{ secrets.TRACKER_READ_KEY }}
          path: tracker

      - name: Set up Python
        if: steps.gate.outputs.due == 'true'
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: tracker/requirements.txt

      - name: Install dependencies
        if: steps.gate.outputs.due == 'true'
        run: pip install -r tracker/requirements.txt

      - name: Generate market overview
        if: steps.gate.outputs.due == 'true'
        env:
          TRACKER_ROOT: ${{ github.workspace }}/tracker
        run: |
          cd site
          python scripts/generate_market_overview.py

      - name: Commit refreshed data
        if: steps.gate.outputs.due == 'true'
        run: |
          cd site
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/market.json data/telegram_signal_state.json data/completed_trades_log.jsonl
          if git diff --cached --quiet; then
            echo "No data changes to commit."
            exit 0
          fi
          commit_message="chore(data): refresh market overview [skip ci]"
          git commit -m "$commit_message"
          for attempt in 1 2 3; do
            if git pull --rebase origin main && git push origin main; then
              exit 0
            fi
            echo "Push failed on attempt $attempt; rebuilding commit on latest origin/main."
            git rebase --abort || true
            git fetch origin main
            git reset --soft origin/main
            git add data/market.json data/telegram_signal_state.json data/completed_trades_log.jsonl
            if git diff --cached --quiet; then
              echo "No data changes remain after syncing with origin/main."
              exit 0
            fi
            git commit -m "$commit_message"
          done
          echo "Data push failed after 3 attempts."
          exit 1

  # Reliable driver for the engine's real-time "signal generated" Telegram push.
  # That push (pushRealtimeSignalAlerts in api/live-market.js) runs ONLY when the
  # serverless function executes, and only catches a signal while it is live
  # (triggerQualified). Nothing else forces frequent execution, so short-lived
  # signals (a 91% NIFTY 24050 CE that fired and hit stop in ~5 min on
  # 2026-07-09) lived and died between cache-served requests: the function never
  # ran during their live window, so no "signal generated" alert fired even
  # though the trade was tracked and completed.
  # This job pings the forceLive endpoint (no-store => always runs the function)
  # several times per dispatch during market hours, so every live signal is seen
  # within ~30s. The engine's own 36h sent-marker dedup guarantees one alert per
  # signal regardless of how many pings see it. No secrets: scope=public.
  # continue-on-error so it can never affect digest delivery.
  warm-signal-engine:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    continue-on-error: true

    steps:
      - name: Ping forceLive during market hours to drive real-time signal alerts
        run: |
          dow=$(TZ=Asia/Kolkata date +%u)
          now=$(TZ=Asia/Kolkata date +%H%M)
          if [ "$dow" -gt 5 ] || [ "$now" -lt 0915 ] || [ "$now" -gt 1531 ]; then
            echo "Outside Mon-Fri 09:15-15:31 IST; skipping engine warm pings."
            exit 0
          fi
          url="https://www.easemytrade.in/api/live-market/?forceLive=1&scope=public"
          # External cron dispatches this workflow ~every 2 min; ping every ~28s
          # so consecutive runs give near-continuous ~30s coverage of live signals.
          for i in 1 2 3; do
            code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 60 "${url}&t=$(date +%s%N)" || echo "000")
            echo "ping $i -> HTTP $code at $(TZ=Asia/Kolkata date +%H:%M:%S) IST"
            if [ "$i" -lt 3 ]; then sleep 35; fi
          done
          exit 0
